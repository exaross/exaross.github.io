<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel test</title>

    <link rel="stylesheet" href="styles/normalize.css">

    <style>

        html {
            font-size: 10px;
        }

        * {
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 120rem;
            height: 40rem;
            border: .1rem solid blue;
        }
        
        .list {
            position: absolute;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 240rem;
            margin: 0;
            padding: 0;
        }

        .element {
            padding: 5rem;
            background-color: black;
            color: green;
            font-size: 5rem;
            outline: .1rem solid green;
        }

        .image {
            width: 100%;
            height: 100%;
        }

        .button {
            position: absolute;
            top: calc(50% - 1.5rem);
            padding: 3rem;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-color: transparent;
            opacity: 0.5;
            z-index: 10;
            cursor: pointer;
            background-color: blue;
            transition: all .2s ease-in-out;
        }

        .left {
            left: 1rem;
            visibility: hidden;
        }

        .right {
            right: 1rem;
            visibility: visible;
        }

    </style>

</head>
<body>
    
        <div class="box">
            <button class="button left">Left</button>
            <ul class="list">
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
                <div class="element">
                    <img src="/img/white.png" alt="white" class="image">
                </div>
            </ul>
            <button class="button right">Right</button>
        </div>

    <script>

        /* Elements */

        let box = document.querySelector('.box');
        let boxWidth = box.offsetWidth;
        let boxHeight = box.offsetHeight;

        let list = document.querySelector('.list');
        let listWidth = list.offsetWidth;
        let elements = document.querySelectorAll('.element');
        let element = document.querySelector('.element');
        let elementWidth = element.offsetWidth;

        /* Buttons */

        let leftButton = document.querySelector('.left');
        let rightButton = document.querySelector('.right');
        let position = 0;
        let elementMargin = boxWidth * 0.01;
        let checkValue = ((listWidth / 2) * (-1)) + "px";

        for (let element of elements) {
            element.style.width = (boxWidth / 3) + "px";
            element.style.height = (boxHeight / 1.1) + "px";
            element.style.margin = elementMargin + "px";
        }

        rightButton.addEventListener('click', function() {
            console.log('it works');
            let element = document.querySelector('.element');
            let elementWidth = element.offsetWidth;
                position -= elementWidth + (elementMargin * 2);
                list.style.marginLeft = position + "px";
                console.log("Margin Left: " + list.style.marginLeft);

                leftButton.style.visibility = "visible";


                if (list.style.marginLeft <= checkValue) {
                    rightButton.style.visibility = "hidden";
                }

        })

        leftButton.addEventListener('click', function() {

            console.log('it works');
            let element = document.querySelector('.element');
            let elementWidth = element.offsetWidth;
                position += elementWidth + (elementMargin * 2);
                list.style.marginLeft = position + "px";
                console.log("Margin Left: " + list.style.marginLeft);

                rightButton.style.visibility = "visible";

                if (list.style.marginLeft >= '0') {
                    leftButton.style.visibility = "hidden";
                }

        })


    </script>

</body>
</html>
