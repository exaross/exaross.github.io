<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="styles/normalize.css">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <link rel="stylesheet" type="text/css" href="styles/cr.css">

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <title>Works for OOK</title>

</head>
<body class="container">

    <div id="page-container">

        <div id="content-wrap">
            <header class="header">
                <nav class="header-nav">
                    <a href="index.html" class="header-nav__logo">Alexandr Grosu</a>
                    <ul class="header-nav__list">
                        <li class="header-nav__item">
                            <a href="projects.html" class="header-nav__link active">Projects</a>
                        </li>
                        <li class="header-nav__item">
                            <a href="resume.html" class="header-nav__link">Resume</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <main class="main-ook">
                <section class="ook-video">  
                    <h2 class="ook-video__heading">
                        Video:
                    </h2>
                        <video width="90%" src="/video/OOK.mp4" type="video/mp4" controls poster="/img/ook/Preview.png"></video> 
                            <div>
                                <a class="ook-video__link" target="_blank" href="https://bit.ly/OOK_YT">
                                Watch on YouTube
                                </a>
                            </div>
                </section>

                <h2 class="ook-images__heading">
                    Images and GIF's:
                </h2>

                <section class="section-ook-images">

                    <div id="upscale__cover">
                        <div id="upscale__images">
                            <img src="/img/cs/jenickseart.jpg" alt="upscaled image" class="upscale__image" id="upscale__image">
                            <img src="/img/icons/cancel.png" alt="upscale icon" class="upscale__icon" id="upscale__icon">
                        </div>
                    </div>

                    <div class="cr-box">
                        <button class="cr-button button-left"></button>
                        <ul class="cr-list" id="cr-list">
                            <li class="cr-element">
                                <img src="/img/ook/Chinese_New_Year.png" alt="Chinese New Year" class="cr-image">
                            </li>
                            <li class="cr-element" id="second-item">
                                <img src="/img/ook/Good_morning.png" alt="jenickse art" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Chocolate_Day.png" alt="Chocolate Day" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Coffee_Good_Morning.png" alt="Coffee Good Morning" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Rose.png" alt="Rose" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Groundhog.png" alt="Groundhog" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Rainy_Evening.png" alt="Rainy Evening" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/Good_Night.png" alt="Good Night" class="cr-image">
                            </li>
                            <li class="cr-element">
                                <img src="/img/ook/TheOwl.png" alt="The Owl" class="cr-image">
                            </li>
                        </ul>
                        <button class="cr-button button-right"></button>
                    </div>

                </section>
                
            </main>
        </div>

        <footer class="footer">
            <nav class="footer-nav">
                <div class="footer-nav__logo">
                    <a href="#page-container" class="footer-nav__link">X</a>
                </div>
                <p class="footer-nav__copyright">© 2022 | All rights reserved</p>
            </nav>
        </footer>

    </div>

    <script src="js/cr.js"></script>
    
</body>
</html>
