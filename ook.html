<body class="container">

    <div id="page-container">

        <div id="content-wrap">
            <header class="header">

                    <a href="index.html" class="header-nav__logo">Alexandr Grosu</a>

            <main class="main main-ook">

                <section class="video">

                            </div>
                </section>

                <h2 class="image__heading">
                    Images and GIF's:
                </h2>
                <section class="images">
                    <div class="image__item">
                        <a href="img/ook/Chinese_New_Year.png" class="image__link" target="_blank">
                            <img src="img/ook/Chinese_New_Year.png" alt="mci" class="image__image">

                    </div>
                    <div class="image__item">
                        <a href="img/ook/Chocolate_Day.gif" class="image__link" target="_blank">

                    </div>

                        <a href="img/ook/Coffee_Good_Morning.gif" class="image__link" target="_blank">

                    </div>
                    <div class="image__item">
                        <a href="img/ook/Good_morning.gif" class="image__link" target="_blank">

                        </a>
                    </div>
                    <div class="image__item">
                        <a href="img/ook/Good_Night.gif" class="image__link" target="_blank">
                            <img src="img/ook/Good_Night.png" alt="Good night" class="image__image">

                        <a href="img/ook/Rainy_Evening.gif" class="image__link" target="_blank">

    <script>
        $(".image__image").mouseover(function(){
            let path = this.src;
            if (path.includes('png')){
                let npath = path.replace('png','gif');
                this.src=npath;
            }
        })
        $(".image__image").mouseout(function(){
            let path = this.src;
            if (path.includes('gif')){
                let npath = path.replace('gif','png');
                this.src=npath;
            }
        })
    </script>
