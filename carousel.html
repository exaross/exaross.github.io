<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="styles/normalize.css">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <title>Carousel</title>

</head>
<body>

    <div class="carousel">

        <div id="carousel-upscale__cover">
            <div id="carousel-upscale__images">
                <img src="/img0/cs/jenickseart.jpg" alt="carousel upscaled image" class="carousel-upscale__image" id="carousel-upscale__image">
                <img src="/img0/icons/cancel.png" alt="upscale icon" class="carousel-upscale__icon" id="carousel-upscale__icon">
            </div>
        </div>

        <div class="carousel__container">
            <div class="carousel__button button-left" id="button-left"></div>
            <div class="carousel__button button-right" id="button-right"></div>
            <ul class="carousel__list" id="carousel__list">
                <li class="carousel__item">
                    <img src="/img0/ook/Chinese_New_Year.png" alt="Chinese New Year" class="carousel__image">
                </li>
                <li class="carousel__item" id="second-item">
                    <img src="/img0/ook/Good_morning.png" alt="jenickse art" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Chocolate_Day.png" alt="Chocolate Day" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Coffee_Good_Morning.png" alt="Coffee Good Morning" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Rose.png" alt="Rose" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Groundhog.png" alt="Groundhog" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Rainy_Evening.png" alt="Rainy Evening" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/Good_Night.png" alt="Good Night" class="carousel__image">
                </li>
                <li class="carousel__item">
                    <img src="/img0/ook/TheOwl.png" alt="The Owl" class="carousel__image">
                </li>
            </ul>
        </div>
    </div>

    <script src="/js/carousel.js"></script>
    
</body>
</html>
